<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Haven & Beyond</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f8f8f8;
}

header{
background:#111;
color:white;
padding:20px;
text-align:center;
}

.hero{
padding:60px 20px;
text-align:center;
background:white;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.hero p{
font-size:18px;
color:#666;
}

.btn{
display:inline-block;
margin-top:20px;
padding:12px 30px;
background:#ff6600;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:12px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

.card img{
width:100%;
border-radius:10px;
}

footer{
background:#111;
color:white;
text-align:center;
padding:20px;
margin-top:40px;
}
</style>

</head>

<body>

<header>
<h2>Haven & Beyond</h2>
</header>

<section class="hero">
<h1>Welcome to Haven & Beyond</h1>
<p>Best Gadgets • Toys • Kitchen • Home Decor</p>

<a class="btn" href="#">Shop Now</a>
</section>

<section class="products">

<div class="card">
<h3>Product 1</h3>
<p>Add Product Image Later</p>
</div>

<div class="card">
<h3>Product 2</h3>
<p>Add Product Image Later</p>
</div>

<div class="card">
<h3>Product 3</h3>
<p>Add Product Image Later</p>
</div>

</section>

<footer>
© 2026 Haven & Beyond
</footer>

</body>
</html>
